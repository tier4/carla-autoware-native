# CARLA UE5 + RGL development environment
#
# Usage:
#   cp .env.example .env   # Edit paths for your environment
#   docker compose build
#   docker compose up -d
#   docker compose exec carla bash

services:
  carla:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: carla-dev
    network_mode: ${NETWORK_MODE:-bridge}
    ports:
      # Only effective in bridge mode (ignored when network_mode=host)
      - "2000-2002:2000-2002"   # CARLA client
      - "1985:1985"             # CARLA display control
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # Mount at same absolute path as host so symlinks (e.g. Content
      # created by carla-env.sh) resolve correctly inside the container.
      # WORK_PATH covers UE5, CarlaUE5, RGL (all under one parent dir).
      - ${WORK_PATH:?Set WORK_PATH in .env}:${WORK_PATH}
      # Claude Code config
      - ${CLAUDE_CONFIG:-~/.claude}:/home/carla/.claude
      # Optional mounts (comment out if not needed)
      - ${AWSIM_PATH:-/dev/null}:${AWSIM_PATH:-/awsim}:ro
      - ${AUTOWARE_PATH:-/dev/null}:${AUTOWARE_PATH:-/autoware}:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CARLA_UNREAL_ENGINE_PATH=${WORK_PATH}/${UE5_SUBDIR:-UnrealEngine5_carla}
      - DISPLAY=${DISPLAY:-}
      - SDL_VIDEODRIVER=${SDL_VIDEODRIVER:-x11}
    working_dir: ${WORK_PATH}/${CARLA_SUBDIR:-CarlaUE5}
    stdin_open: true
    tty: true
